<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script>
      const path = window.location.pathname;
      if (path.startsWith("/products/")) {
        const newPath = path.replace(/^\/products\//, "/docs/");
        window.location.replace(newPath + window.location.search + window.location.hash);
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>404 — Not Found</title>

    <link rel="dns-prefetch" href="//fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet" />

    <style type="text/tailwindcss">
      @theme {
        --font-sans: "Figtree", sans-serif;
      }
    </style>
  </head>

  <body class="bg-white text-[#636b6f] font-sans font-light h-screen flex items-center justify-center">
    <div class="flex flex-col items-center">
      <div class="flex items-center mb-2">
        <div class="text-2xl border-r-2 border-[#636b6f] px-4">404</div>
        <div class="text-lg px-4">Not Found</div>
      </div>

      <div class="flex flex-col">
        <div class="text-center mb-8">This page does not exist</div>
        <div class="text-center text-sm mb-2 text-gray-400">You might be looking for</div>
      </div>

      <div class="w-50 flex flex-col divide-y divide-gray-200">
        <a href="/" class="flex items-center justify-center py-2 hover:text-gray-900 transition-colors"> Portfolio </a>
        <a href="/docs" class="flex items-center justify-center py-2 hover:text-gray-800 transition-colors"> Documentation </a>
        <!--<a href="/blog" class="flex items-center justify-center py-2 hover:text-gray-800 transition-colors"> Blog </a>-->
      </div>
    </div>
  </body>
</html>
