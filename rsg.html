<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random String Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light p-4">
  <div class="container mt-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-3">Random String Generator</h3>

        <div class="mb-3">
          <label class="form-label">Length</label>
          <input type="number" id="length" value="16" min="1" class="form-control" style="max-width:150px;" />
        </div>

        <div class="mb-3">
          <label class="form-label">Characters</label>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="lower" checked>
            <label class="form-check-label">lowercase (a-z)</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="upper" checked>
            <label class="form-check-label">uppercase (A-Z)</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="numbers" checked>
            <label class="form-check-label">numbers (0-9)</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="symbols" checked>
            <label class="form-check-label">symbols (!@#$%^&*)</label>
          </div>
        </div>

        <button class="btn btn-primary me-2" onclick="generate()">Generate</button>
        <button class="btn btn-secondary" onclick="copyToClipboard()">Copy</button>

        <div id="output" class="alert alert-secondary mt-3" style="word-break:break-all;">
          Your string will appear here...
        </div>
      </div>
    </div>
  </div>

  <script>
    function generate() {
      const length = parseInt(document.getElementById('length').value);
      const lower = document.getElementById('lower').checked ? 'abcdefghijklmnopqrstuvwxyz' : '';
      const upper = document.getElementById('upper').checked ? 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' : '';
      const numbers = document.getElementById('numbers').checked ? '0123456789' : '';
      const symbols = document.getElementById('symbols').checked ? '!@#$%^&*(){}[]<>?/|~' : '';

      let charset = lower + upper + numbers + symbols;
      if (!charset) {
        document.getElementById('output').innerText = "Please select at least one character set.";
        return;
      }

      let result = '';
      for (let i = 0; i < length; i++) {
        result += charset.charAt(Math.floor(Math.random() * charset.length));
      }

      document.getElementById('output').innerText = result;
    }

    function copyToClipboard() {
      const text = document.getElementById('output').innerText;
      navigator.clipboard.writeText(text);
      alert('Copied to clipboard!');
    }

    generate();

    // Auto-regenerate on input changes
    document.getElementById('length').addEventListener('input', generate);
    document.getElementById('lower').addEventListener('change', generate);
    document.getElementById('upper').addEventListener('change', generate);
    document.getElementById('numbers').addEventListener('change', generate);
    document.getElementById('symbols').addEventListener('change', generate);
  </script>
</body>

</html>
